<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDESTIGE | Terminal</title>
    <style>
        body { background-color: #050505; color: #00ff41; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .terminal { background: rgba(0, 0, 0, 0.95); border: 2px solid #00ff41; padding: 25px; width: 85%; max-width: 650px; box-shadow: 0 0 30px rgba(0, 255, 65, 0.2); border-radius: 8px; position: relative; }
        .header { color: #ff003c; font-weight: bold; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; font-size: 1.2em; text-align: center; }
        .line { margin: 10px 0; min-height: 20px; }
        .cursor { display: inline-block; width: 8px; height: 18px; background: #00ff41; animation: blink 1s infinite; margin-right: 5px; }
        @keyframes blink { 50% { opacity: 0; } }
        .social-links { margin-top: 25px; display: flex; gap: 15px; justify-content: center; }
        .btn { padding: 8px 15px; border: 1px solid #00ff41; color: #00ff41; text-decoration: none; font-size: 0.9em; transition: 0.3s; }
        .btn:hover { background: #00ff41; color: #000; box-shadow: 0 0 15px #00ff41; }
        .glitch { animation: glitch 1s linear infinite; }
        @keyframes glitch { 2%, 64% { transform: translate(2px,0) skew(0deg); } 4%, 60% { transform: translate(-2px,0) skew(0deg); } }
    </style>
</head>
<body>
    <div class="terminal">
        <div class="header glitch">[ RDESTIGE OFFICIAL SERVER ]</div>
        <div class="line">> جاري فحص النظام... <span style="color: #00eeff;">[100%]</span></div>
        <div class="line">> المستخدم: root@ayoub-device</div>
        <div class="line">> الحالة: <span style="color: yellow;">متصل عبر GitHub Pages</span></div>
        <div class="line">> الرسالة: مرحباً بكم في خادمي الخاص. يتم الآن تشفير البيانات...</div>
        <div class="line">> <span class="cursor"></span></div>
        
        <div class="social-links">
            <a href="https://github.com/ayoub05583225-lang" class="btn">GitHub</a>
            <a href="#" class="btn">Instagram</a>
            <a href="#" class="btn">Telegram</a>
        </div>
    </div>
</body>
</html>
