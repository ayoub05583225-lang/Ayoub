<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDESTIGE | Terminal</title>
    <style>
        body { background-color: #0d0d0d; color: #00ff41; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .terminal { background: rgba(0, 0, 0, 0.9); border: 1px solid #00ff41; padding: 20px; width: 80%; max-width: 600px; box-shadow: 0 0 20px #00ff41; border-radius: 5px; }
        .header { color: #ff003c; font-weight: bold; border-bottom: 1px solid #00ff41; padding-bottom: 10px; margin-bottom: 20px; }
        .cursor { display: inline-block; width: 10px; height: 20px; background: #00ff41; animation: blink 1s infinite; vertical-align: middle; }
        @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
        .btn { display: inline-block; margin-top: 20px; padding: 10px 20px; border: 1px solid #00ff41; color: #00ff41; text-decoration: none; transition: 0.3s; }
        .btn:hover { background: #00ff41; color: #000; }
    </style>
</head>
<body>
    <div class="terminal">
        <div class="header">[ RDESTIGE OFFICIAL SERVER ]</div>
        <p>> جاري الاتصال بخوادم كالي... <span style="color: yellow;">[تم]</span></p>
        <p>> اسم المستخدم: root@localhost</p>
        <p>> الحالة: الموقع يعمل الآن من هاتفي عبر GitHub</p>
        <p>> مرحباً بك في عالم البرمجة والأمن الرقمي.<span class="cursor"></span></p>
        <a href="https://github.com/your-username" class="btn">تابعني على GitHub</a>
    </div>
</body>
</html>
